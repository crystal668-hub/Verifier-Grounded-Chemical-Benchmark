tasks:
  - task_id: rdkit_forcefield_energy_range_window_001
    version: 1
    object_type: small_molecule
    difficulty: prototype
    formal_track: false
    capability_tags: [open_generation, property_satisfaction, rdkit_forcefield, conformer_ensemble]
    prompt: |
      Propose one valid single-component molecule and provide it as a SMILES string.

      The molecule must satisfy these requirements:
      - The SMILES must describe exactly one component; dot-separated multi-component SMILES are not accepted.
      - Allowed elements: H, B, C, N, O, F, P, S, Cl, Br, I.
      - Heavy atom count must be between 5 and 60 inclusive.
      - Molecular weight must be at most 600.0 daltons.
      - Formal charge must be between -1 and 1 inclusive.
      - Have a moderate RDKit force-field conformer energy range between 0.0 and 20.0 kcal/mol.

      Your final answer must appear on its own line exactly in this format:
      FINAL ANSWER: <SMILES>
    answer_schema: &answer_schema
      format: final_answer_line
      final_answer_prefix: "FINAL ANSWER:"
      value_type: smiles
      cardinality: one
      example: "FINAL ANSWER: CCOc1ccc(NC(=O)C)cc1"
    constraints:
      - type: window
        property: energy_range_kcal_mol
        verifier_id: rdkit_forcefield_energy_range_v1
        min: 0.0
        max: 20.0
        sigma: 5.0
    scoring:
      aggregation: geometric_mean
    failure_policy: &failure_policy
      invalid_json: parse_error
      invalid_smiles: parse_error
      multi_component: validity_error
      outside_domain: domain_error
      forcefield_failure: verifier_tool_error
      timeout: verifier_timeout

  - task_id: rdkit_forcefield_convergence_max_002
    version: 1
    object_type: small_molecule
    difficulty: prototype
    formal_track: false
    capability_tags: [open_generation, property_satisfaction, rdkit_forcefield, geometry_quality]
    prompt: |
      Propose one valid single-component molecule and provide it as a SMILES string.

      The molecule must satisfy these requirements:
      - The SMILES must describe exactly one component; dot-separated multi-component SMILES are not accepted.
      - Allowed elements: H, B, C, N, O, F, P, S, Cl, Br, I.
      - Heavy atom count must be between 5 and 60 inclusive.
      - Molecular weight must be at most 600.0 daltons.
      - Formal charge must be between -1 and 1 inclusive.
      - Maximize the fraction of generated conformers whose RDKit force-field minimization converges.

      Your final answer must appear on its own line exactly in this format:
      FINAL ANSWER: <SMILES>
    answer_schema: *answer_schema
    constraints:
      - type: maximize_bounded
        property: optimization_converged_fraction
        verifier_id: rdkit_forcefield_convergence_v1
        lower: 0.0
        upper: 1.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

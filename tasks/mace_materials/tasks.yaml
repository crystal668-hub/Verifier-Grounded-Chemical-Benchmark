tasks:
  - task_id: mace_energy_window_si_001
    version: 1
    object_type: crystal_structure
    difficulty: basic
    formal_track: true
    capability_tags: [open_generation, property_satisfaction, materials, mace, atomisticskills_mcp, energy]
    prompt: |
      Propose one periodic crystalline material as a CIF.

      The material must satisfy:
      - MACE potential energy between -20.0 and 20.0 eV in the fixed MACE-MP-small model output convention.
      - Use a compact periodic unit cell suitable for local verifier evaluation.

      Your final answer must appear exactly in this format:
      FINAL ANSWER:
      ```cif
      <CIF content>
      ```
    answer_schema:
      format: final_answer_block
      final_answer_prefix: "FINAL ANSWER:"
      value_type: cif
      fence_language: cif
      cardinality: one
      example: |
        FINAL ANSWER:
        ```cif
        data_example
        ...
        ```
    constraints:
      - type: window
        property: energy
        verifier_id: mace_energy_mcp_v1
        min: -20.0
        max: 20.0
        sigma: 5.0
    scoring:
      aggregation: geometric_mean
    failure_policy:
      malformed_final_answer: parse_error
      invalid_cif: parse_error
      outside_domain: domain_error
      missing_environment: verifier_environment_error
      backend_failure: verifier_tool_error
      timeout: verifier_timeout


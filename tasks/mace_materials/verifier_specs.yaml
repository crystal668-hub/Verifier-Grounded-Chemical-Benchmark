verifiers:
  - verifier_id: mace_energy_mcp_v1
    name: AtomisticSkills MACE Energy Verifier
    version: 1
    environment: mace-agent
    formal_track: true
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/materials/mace_energy.py
    timeout_seconds: 240
    property_name: energy
    resources:
      cpu: 2
      memory_mb: 8192
    backend:
      type: atomisticskills_mcp
      server: mace
    package_versions:
      atomisticskills: external
      mace_torch: mace-agent
      pymatgen: "2026.5.4"
    mace:
      tools:
        - load_model
        - predict_structure
      model_name: MACE-MP-small
      device: cpu
    domain:
      allowed_elements: [Si]
      atom_count: [1, 8]
      volume: [1.0, 300.0]
    property:
      source: AtomisticSkills mace.load_model + mace.predict_structure
      units: eV
      notes: Fixed MACE potential-energy surrogate output, not an experimental database label.
    scoring:
      supported_modes:
        - window
      final_score_range: [0.0, 1.0]
    failure_policy:
      parse_error: missing inline CIF or unparseable CIF
      domain_error: outside material domain
      verifier_environment_error: AtomisticSkills checkout, conda, mace-agent, or MCP config missing
      verifier_tool_error: MACE MCP tool failed or output payload was invalid
      verifier_timeout: MACE MCP call exceeded timeout


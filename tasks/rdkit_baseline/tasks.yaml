tasks:
  - task_id: rdkit_qed_max_001
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor]
    prompt: >
      Propose one valid single-component small-molecule SMILES. The goal is to
      maximize QED, which is scored on a bounded 0.0 to 1.0 scale.
    answer_schema: &answer_schema
      format: json
      required_fields: [candidates]
      candidate_fields: [smiles]
      example: {"candidates": [{"smiles": "CC(=O)Oc1ccccc1C(=O)O"}]}
    constraints:
      - type: maximize_bounded
        property: qed
        lower: 0.0
        upper: 1.0
    scoring:
      aggregation: geometric_mean
    failure_policy: &failure_policy
      invalid_json: parse_error
      invalid_smiles: parse_error
      multi_component: validity_error
      outside_domain: domain_error

  - task_id: rdkit_sa_min_002
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor]
    prompt: >
      Propose one valid single-component small-molecule SMILES. The goal is to
      minimize synthetic accessibility score, which is scored on a fixed 1.0
      to 10.0 range where lower is better.
    answer_schema: *answer_schema
    constraints:
      - type: minimize_bounded
        property: sa_score
        lower: 1.0
        upper: 10.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_logp_window_003
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor]
    prompt: >
      Propose one valid single-component small-molecule SMILES whose logP is
      between 1.0 and 3.0.
    answer_schema: *answer_schema
    constraints:
      - type: window
        property: logp
        min: 1.0
        max: 3.0
        sigma: 0.5
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_tpsa_window_004
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor]
    prompt: >
      Propose one valid single-component small-molecule SMILES whose TPSA is
      between 35.0 and 75.0 square angstroms.
    answer_schema: *answer_schema
    constraints:
      - type: window
        property: tpsa
        min: 35.0
        max: 75.0
        sigma: 10.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_mw_window_005
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor]
    prompt: >
      Propose one valid single-component small-molecule SMILES whose molecular
      weight is between 150.0 and 300.0 daltons.
    answer_schema: *answer_schema
    constraints:
      - type: window
        property: mw
        min: 150.0
        max: 300.0
        sigma: 25.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_hba_window_006
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor]
    prompt: >
      Propose one valid single-component small-molecule SMILES with a moderate
      number of hydrogen-bond acceptors, between 2.0 and 4.0 inclusive.
    answer_schema: *answer_schema
    constraints:
      - type: window
        property: hba
        min: 2
        max: 4
        sigma: 1.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_hbd_window_007
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor]
    prompt: >
      Propose one valid single-component small-molecule SMILES with a small but
      nonzero number of hydrogen-bond donors, between 1.0 and 2.0 inclusive.
    answer_schema: *answer_schema
    constraints:
      - type: window
        property: hbd
        min: 1
        max: 2
        sigma: 1.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_fsp3_max_008
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor]
    prompt: >
      Propose one valid single-component small-molecule SMILES. The goal is to
      maximize fraction Csp3, whose theoretical range is 0.0 to 1.0.
    answer_schema: *answer_schema
    constraints:
      - type: maximize_bounded
        property: fraction_csp3
        lower: 0.0
        upper: 1.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_qed_sa_009
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor, multi_objective]
    prompt: >
      Propose one valid single-component small-molecule SMILES that balances two
      objectives: maximize QED on a bounded 0.0 to 1.0 scale, and minimize
      synthetic accessibility score on a fixed 1.0 to 10.0 range where lower is
      better.
    answer_schema: *answer_schema
    constraints:
      - type: maximize_bounded
        property: qed
        lower: 0.0
        upper: 1.0
      - type: minimize_bounded
        property: sa_score
        lower: 1.0
        upper: 10.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_logp_tpsa_010
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor, multi_objective]
    prompt: >
      Propose one valid single-component small-molecule SMILES whose logP is
      between 1.0 and 3.0 and whose TPSA is between 35.0 and 75.0 square
      angstroms.
    answer_schema: *answer_schema
    constraints:
      - type: window
        property: logp
        min: 1.0
        max: 3.0
        sigma: 0.5
      - type: window
        property: tpsa
        min: 35.0
        max: 75.0
        sigma: 10.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_mw_qed_011
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor, multi_objective]
    prompt: >
      Propose one valid single-component small-molecule SMILES with molecular
      weight between 150.0 and 300.0 daltons while also maximizing QED on a
      bounded 0.0 to 1.0 scale.
    answer_schema: *answer_schema
    constraints:
      - type: window
        property: mw
        min: 150.0
        max: 300.0
        sigma: 25.0
      - type: maximize_bounded
        property: qed
        lower: 0.0
        upper: 1.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

  - task_id: rdkit_hba_hbd_012
    version: 1
    object_type: small_molecule
    difficulty: simple
    verifier_id: small_molecule_rdkit_v1
    capability_tags: [open_generation, property_satisfaction, rdkit_descriptor, multi_objective]
    prompt: >
      Propose one valid single-component small-molecule SMILES with both a
      moderate number of hydrogen-bond acceptors, between 2.0 and 4.0 inclusive,
      and a small nonzero number of hydrogen-bond donors, between 1.0 and 2.0
      inclusive.
    answer_schema: *answer_schema
    constraints:
      - type: window
        property: hba
        min: 2
        max: 4
        sigma: 1.0
      - type: window
        property: hbd
        min: 1
        max: 2
        sigma: 1.0
    scoring:
      aggregation: geometric_mean
    failure_policy: *failure_policy

verifiers:
  - verifier_id: rdkit_qed_v1
    name: RDKit QED Descriptor Verifier
    version: 1
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_descriptors/rdkit_qed.py
    timeout_seconds: 60
    descriptor: qed
    resources: &resources
      cpu: 1
      memory_mb: 1024
    backend: &backend
      type: rdkit_descriptors
    package_versions: &package_versions
      rdkit: "2026.3.2"
    domain: &domain
      allowed_elements: [H, B, C, N, O, F, P, S, Cl, Br, I]
      heavy_atom_count: [5, 60]
      mw: [0.0, 600.0]
      formal_charge: [-1, 1]
    property:
      source: rdkit.Chem.QED.qed
      range: [0.0, 1.0]
    scoring: &scoring
      supported_modes:
        - window
        - maximize_bounded
        - minimize_bounded
      bounded_modes:
        good_at_or_baseline: forbidden
      final_score_range: [0.0, 1.0]
    failure_policy: &failure_policy
      parse_error: invalid answer JSON shape, missing SMILES, or unparseable SMILES
      validity_error: multi-component SMILES or unsanitizable molecule
      domain_error: outside element, heavy atom, MW, or formal charge domain

  - verifier_id: rdkit_logp_v1
    name: RDKit logP Descriptor Verifier
    version: 1
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_descriptors/rdkit_logp.py
    timeout_seconds: 60
    descriptor: logp
    resources: *resources
    backend: *backend
    package_versions: *package_versions
    domain: *domain
    property:
      source: rdkit.Chem.Crippen.MolLogP
    scoring: *scoring
    failure_policy: *failure_policy

  - verifier_id: rdkit_tpsa_v1
    name: RDKit TPSA Descriptor Verifier
    version: 1
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_descriptors/rdkit_tpsa.py
    timeout_seconds: 60
    descriptor: tpsa
    resources: *resources
    backend: *backend
    package_versions: *package_versions
    domain: *domain
    property:
      source: rdkit.Chem.rdMolDescriptors.CalcTPSA
      units: angstrom_squared
    scoring: *scoring
    failure_policy: *failure_policy

  - verifier_id: rdkit_mw_v1
    name: RDKit Molecular Weight Descriptor Verifier
    version: 1
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_descriptors/rdkit_mw.py
    timeout_seconds: 60
    descriptor: mw
    resources: *resources
    backend: *backend
    package_versions: *package_versions
    domain: *domain
    property:
      source: rdkit.Chem.Descriptors.MolWt
      units: dalton
    scoring: *scoring
    failure_policy: *failure_policy

  - verifier_id: rdkit_hba_v1
    name: RDKit Hydrogen-Bond Acceptor Descriptor Verifier
    version: 1
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_descriptors/rdkit_hba.py
    timeout_seconds: 60
    descriptor: hba
    resources: *resources
    backend: *backend
    package_versions: *package_versions
    domain: *domain
    property:
      source: rdkit.Chem.rdMolDescriptors.CalcNumHBA
    scoring: *scoring
    failure_policy: *failure_policy

  - verifier_id: rdkit_hbd_v1
    name: RDKit Hydrogen-Bond Donor Descriptor Verifier
    version: 1
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_descriptors/rdkit_hbd.py
    timeout_seconds: 60
    descriptor: hbd
    resources: *resources
    backend: *backend
    package_versions: *package_versions
    domain: *domain
    property:
      source: rdkit.Chem.rdMolDescriptors.CalcNumHBD
    scoring: *scoring
    failure_policy: *failure_policy

  - verifier_id: rdkit_sa_score_v1
    name: RDKit Synthetic Accessibility Descriptor Verifier
    version: 1
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_descriptors/rdkit_sa_score.py
    timeout_seconds: 60
    descriptor: sa_score
    resources: *resources
    backend: *backend
    package_versions: *package_versions
    domain: *domain
    property:
      source: rdkit.Contrib.SA_Score.sascorer.calculateScore
      scoring_range: [1.0, 10.0]
    scoring: *scoring
    failure_policy: *failure_policy

  - verifier_id: rdkit_fraction_csp3_v1
    name: RDKit Fraction Csp3 Descriptor Verifier
    version: 1
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_descriptors/rdkit_fraction_csp3.py
    timeout_seconds: 60
    descriptor: fraction_csp3
    resources: *resources
    backend: *backend
    package_versions: *package_versions
    domain: *domain
    property:
      source: rdkit.Chem.rdMolDescriptors.CalcFractionCSP3
      range: [0.0, 1.0]
    scoring: *scoring
    failure_policy: *failure_policy

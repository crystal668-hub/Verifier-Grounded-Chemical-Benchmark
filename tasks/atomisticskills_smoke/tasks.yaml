tasks:
  - task_id: atomisticskills_base_supercell_001
    version: 1
    object_type: crystal_structure_operation
    difficulty: smoke
    verifier_id: atomisticskills_base_supercell_mcp_v1
    capability_tags: [atomisticskills, base_agent, mcp, structure_operation]
    prompt: |
      Propose one JSON object specifying a supercell scaling matrix for the provided silicon fixture.

      The operation must satisfy:
      - Double the silicon fixture along the a lattice direction only.
      - Leave the b and c lattice directions unchanged.

      Your final answer must appear on its own line exactly in this format:
      FINAL ANSWER: {"scaling_matrix": [2, 1, 1]}
    answer_schema: &json_answer_schema
      format: final_answer_line
      final_answer_prefix: "FINAL ANSWER:"
      value_type: json
      cardinality: one
      example: "FINAL ANSWER: {\"scaling_matrix\": [2, 1, 1]}"
    constraints:
      - type: exact
        property: atom_count
        value: 4
      - type: exact
        property: reduced_formula
        value: Si
    scoring:
      aggregation: all_or_nothing
    failure_policy: &atomisticskills_failure_policy
      malformed_final_answer: parse_error
      missing_environment: verifier_environment_error
      backend_failure: verifier_tool_error
      timeout: verifier_timeout

  - task_id: atomisticskills_drugdisc_descriptor_001
    version: 1
    object_type: small_molecule
    difficulty: smoke
    verifier_id: atomisticskills_drugdisc_descriptors_mcp_v1
    capability_tags: [atomisticskills, drugdisc_agent, mcp, molecular_descriptor]
    prompt: |
      Propose one valid single-component small-molecule SMILES.

      The molecule must satisfy:
      - Have QED between 0.3 and 0.5.
      - Use only carbon, hydrogen, and oxygen.

      Your final answer must appear on its own line exactly in this format:
      FINAL ANSWER: <SMILES>
    answer_schema:
      format: final_answer_line
      final_answer_prefix: "FINAL ANSWER:"
      value_type: smiles
      cardinality: one
      example: "FINAL ANSWER: CCO"
    constraints:
      - type: window
        property: qed
        min: 0.3
        max: 0.5
        sigma: 0.1
    scoring:
      aggregation: geometric_mean
    failure_policy: *atomisticskills_failure_policy

  - task_id: atomisticskills_xrd_peak_001
    version: 1
    object_type: xrd_peak
    difficulty: smoke
    verifier_id: atomisticskills_xrd_peak_script_v1
    capability_tags: [atomisticskills, xrd_agent, script_adapter, diffraction]
    prompt: |
      Propose the strongest calculated XRD peak position for the provided silicon fixture in degrees 2theta.

      The answer must satisfy:
      - Use CuKa radiation.
      - Report one numeric value in degrees.

      Your final answer must appear on its own line exactly in this format:
      FINAL ANSWER: <NUMBER>
    answer_schema:
      format: final_answer_line
      final_answer_prefix: "FINAL ANSWER:"
      value_type: number
      cardinality: one
      example: "FINAL ANSWER: 16.32"
    constraints:
      - type: absolute_tolerance
        property: two_theta
        tolerance_degrees: 0.2
    scoring:
      aggregation: linear_tolerance
    failure_policy: *atomisticskills_failure_policy

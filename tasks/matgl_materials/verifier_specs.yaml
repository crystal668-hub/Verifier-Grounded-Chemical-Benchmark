verifiers:
  - verifier_id: matgl_bandgap_pbe_mcp_v1
    name: AtomisticSkills MatGL PBE Band Gap Verifier
    version: 1
    formal_track: false
    track_status: prototype
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/materials/atomisticskills_matgl_bandgap.py
    timeout_seconds: 180
    property_name: bandgap
    resources: &resources
      cpu: 2
      memory_mb: 4096
    backend: &matgl_backend
      type: atomisticskills_mcp
      server: matgl
    package_versions: &package_versions
      atomisticskills: external
      matgl: matgl-agent
      pymatgen: "2026.5.4"
    matgl:
      tool: predict_bandgap
      model_name: MEGNet-MP-2019.4.1-BandGap-mfi
      task_name: PBE
    domain: &material_domain
      allowed_elements: [Si]
      atom_count: [1, 8]
      volume: [1.0, 300.0]
    property:
      source: AtomisticSkills matgl.predict_bandgap
      units: eV
      notes: Fixed MatGL PBE band-gap surrogate prediction, not an experimental database label.
    scoring: &scoring
      supported_modes:
        - window
      final_score_range: [0.0, 1.0]
    failure_policy: &failure_policy
      parse_error: missing inline CIF or unparseable CIF
      domain_error: outside material domain
      verifier_environment_error: AtomisticSkills checkout, conda, matgl-agent, or MCP config missing
      verifier_tool_error: MatGL MCP tool failed or output payload was invalid
      verifier_timeout: MatGL MCP call exceeded timeout

  - verifier_id: matgl_formation_energy_mcp_v1
    name: AtomisticSkills MatGL Formation Energy Verifier
    version: 1
    formal_track: false
    track_status: prototype
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/materials/atomisticskills_matgl_formation_energy.py
    timeout_seconds: 180
    property_name: formation_energy
    resources: *resources
    backend: *matgl_backend
    package_versions: *package_versions
    matgl:
      tools:
        - load_model
        - predict_structure
      model_name: MEGNet-Eform-MP-2018.6.1
      device: cpu
    domain: *material_domain
    property:
      source: AtomisticSkills matgl.load_model + matgl.predict_structure
      units: eV
      notes: Fixed MatGL/MEGNet formation-energy surrogate output convention, not an experimental database label.
    scoring: *scoring
    failure_policy: *failure_policy

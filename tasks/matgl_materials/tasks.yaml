tasks:
  - task_id: matgl_bandgap_window_si_001
    version: 1
    object_type: crystal_structure
    difficulty: basic
    formal_track: false
    track_status: prototype
    capability_tags: [open_generation, property_satisfaction, materials, matgl, atomisticskills_mcp, bandgap, prototype]
    notes: "Prototype material-property task for MatGL backend/interface validation; not part of the current formal benchmark track."
    prompt: |
      Propose one periodic crystalline material as a CIF.

      The material must satisfy:
      - MatGL PBE band gap between 0.8 and 1.2 eV.
      - Use a compact periodic unit cell suitable for local verifier evaluation.

      Your final answer must appear exactly in this format:
      FINAL ANSWER:
      ```cif
      <CIF content>
      ```
    answer_schema: &cif_answer_schema
      format: final_answer_block
      final_answer_prefix: "FINAL ANSWER:"
      value_type: cif
      fence_language: cif
      cardinality: one
      example: |
        FINAL ANSWER:
        ```cif
        data_example
        ...
        ```
    constraints:
      - type: window
        property: bandgap
        verifier_id: matgl_bandgap_pbe_mcp_v1
        min: 0.8
        max: 1.2
        sigma: 0.2
    scoring:
      aggregation: geometric_mean
    failure_policy: &matgl_failure_policy
      malformed_final_answer: parse_error
      invalid_cif: parse_error
      outside_domain: domain_error
      missing_environment: verifier_environment_error
      backend_failure: verifier_tool_error
      timeout: verifier_timeout

  - task_id: matgl_eform_window_si_002
    version: 1
    object_type: crystal_structure
    difficulty: basic
    formal_track: false
    track_status: prototype
    capability_tags: [open_generation, property_satisfaction, materials, matgl, atomisticskills_mcp, formation_energy, prototype]
    notes: "Prototype material-property task for MatGL backend/interface validation; not part of the current formal benchmark track."
    prompt: |
      Propose one periodic crystalline material as a CIF.

      The material must satisfy:
      - MatGL formation energy between -0.05 and 0.05 eV in the fixed MEGNet formation-energy model output convention.
      - Use a compact periodic unit cell suitable for local verifier evaluation.

      Your final answer must appear exactly in this format:
      FINAL ANSWER:
      ```cif
      <CIF content>
      ```
    answer_schema: *cif_answer_schema
    constraints:
      - type: window
        property: formation_energy
        verifier_id: matgl_formation_energy_mcp_v1
        min: -0.05
        max: 0.05
        sigma: 0.05
    scoring:
      aggregation: geometric_mean
    failure_policy: *matgl_failure_policy

  - task_id: matgl_bandgap_eform_si_003
    version: 1
    object_type: crystal_structure
    difficulty: basic
    formal_track: false
    track_status: prototype
    capability_tags: [open_generation, property_satisfaction, materials, matgl, atomisticskills_mcp, bandgap, formation_energy, multi_objective, prototype]
    notes: "Prototype material-property task for MatGL backend/interface validation; not part of the current formal benchmark track."
    prompt: |
      Propose one periodic crystalline material as a CIF.

      The material must satisfy both targets:
      - MatGL PBE band gap between 0.8 and 1.2 eV.
      - MatGL formation energy between -0.05 and 0.05 eV in the fixed MEGNet formation-energy model output convention.

      Your final answer must appear exactly in this format:
      FINAL ANSWER:
      ```cif
      <CIF content>
      ```
    answer_schema: *cif_answer_schema
    constraints:
      - type: window
        property: bandgap
        verifier_id: matgl_bandgap_pbe_mcp_v1
        min: 0.8
        max: 1.2
        sigma: 0.2
      - type: window
        property: formation_energy
        verifier_id: matgl_formation_energy_mcp_v1
        min: -0.05
        max: 0.05
        sigma: 0.05
    scoring:
      aggregation: geometric_mean
    failure_policy: *matgl_failure_policy

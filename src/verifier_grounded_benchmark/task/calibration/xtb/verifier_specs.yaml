verifiers:
- verifier_id: xtb_dipole_doublet_gfn2_v1
  name: xTB GFN2 Neutral Doublet Dipole Verifier
  version: 1
  property_name: dipole_moment
  resources: &id001
    cpu: 2
    memory_mb: 4096
  backend:
    type: local_xtb
    executable: xtb
    method: GFN2-xTB
    charge: 0
    uhf: 1
    validate_electron_parity: true
  domain: &id002
    max_absolute_coordinate: 30.0
    min_interatomic_distance: 0.45
    inferred_components: 1
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_dipole
    timeout_seconds: 240
- verifier_id: xtb_gap_charged_closed_shell_gfn2_v1
  name: xTB GFN2 Candidate-Charge Closed-Shell Gap Verifier
  version: 1
  property_name: homo_lumo_gap
  resources: *id001
  backend:
    type: local_xtb
    executable: xtb
    method: GFN2-xTB
    charge_source: xyz_comment
    uhf: 0
    validate_electron_parity: true
  domain: *id002
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_gap
    timeout_seconds: 240
- verifier_id: xtb_total_energy_roy_singlepoint_gfn2_v1
  name: xTB GFN2 ROY Submitted-Geometry Energy Verifier
  version: 1
  property_name: total_energy
  resources: *id001
  backend:
    type: local_xtb
    executable: xtb
    method: GFN2-xTB
    charge: 0
    uhf: 0
    validate_electron_parity: true
    calculation_mode: submitted_singlepoint
  domain: *id002
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_total_energy
    timeout_seconds: 300
- verifier_id: xtb_total_energy_ritonavir_optimized_gfn2_v1
  name: xTB GFN2 Ritonavir Optimized Energy Verifier
  version: 1
  property_name: total_energy
  resources:
    cpu: 2
    memory_mb: 8192
  backend:
    type: local_xtb
    executable: xtb
    method: GFN2-xTB
    charge: 0
    uhf: 0
    validate_electron_parity: true
    calculation_mode: optimized
  domain: *id002
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_total_energy
    timeout_seconds: 600
- verifier_id: xtb_odd_element_gap_dipole_gfn2_v1
  name: xTB GFN2 Joint Dipole and Gap Verifier
  version: 1
  property_name: dipole_moment
  additional_property_names: [homo_lumo_gap]
  resources:
    cpu: 2
    memory_mb: 4096
  backend:
    type: local_xtb
    executable: xtb
    method: GFN2-xTB
    charge: 0
    uhf: 0
    validate_electron_parity: true
    joint_properties: [dipole_moment, homo_lumo_gap]
  domain:
    max_absolute_coordinate: 30.0
    min_interatomic_distance: 0.45
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_dipole
    timeout_seconds: 300
- verifier_id: xtb_pyrene_crest_energy_v1
  name: CREST/xTB Pyrene Trisubstituent Energy Verifier
  version: 1
  property_name: total_energy
  resources:
    cpu: 1
    memory_mb: 4096
  backend:
    type: crest_xtb
    crest_executable: crest
    crest_version: '2.12'
    xtb_executable: xtb
    xtb_version: '6.7.1'
    method: GFN2-xTB
    charge: 0
    uhf: 0
    random_seed: 61453
    threads: 1
    search_level: -mquick
    crest_timeout_seconds: 900
    xtb_timeout_seconds: 300
  package_versions:
    rdkit: 2026.3.2
    crest: '2.12'
    xtb: 6.7.1
  identity:
    reference_smiles: c1cc2ccc3cccc4ccc(c1)c2c34
    formula: C17H10N2O4
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_pyrene_crest_energy
    timeout_seconds: 1250

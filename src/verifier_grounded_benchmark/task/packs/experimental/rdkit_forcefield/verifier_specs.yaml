verifiers:
  - verifier_id: rdkit_forcefield_energy_range_v1
    name: RDKit ETKDG MMFF/UFF Energy Range Verifier
    version: 1
    formal_track: false
    track_status: prototype
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_forcefield/rdkit_energy_range.py
    timeout_seconds: 60
    property_name: energy_range_kcal_mol
    additional_property_names:
      - optimization_converged_fraction
      - embedding_success_rate
      - min_nonbonded_distance_angstrom
    resources: &resources
      cpu: 1
      memory_mb: 1024
    backend: &backend
      type: rdkit_forcefield
      embedder: ETKDGv3
      random_seed: 61453
      num_conformers: 20
      prune_rms_thresh: 0.5
      forcefield_priority: [MMFF94s, MMFF94, UFF]
      max_iters: 200
    package_versions: &package_versions
      rdkit: "2026.3.2"
    domain: &domain
      allowed_elements: [H, B, C, N, O, F, P, S, Cl, Br, I]
      heavy_atom_count: [5, 60]
      mw: [0.0, 600.0]
      formal_charge: [-1, 1]
    property:
      source: RDKit ETKDGv3 conformer generation followed by MMFF94s/MMFF94/UFF minimization
      units: kcal_mol
      notes: Force-field energy ranges are surrogate conformer-ensemble descriptors, not experimental thermodynamic energies.
    scoring: &scoring
      supported_modes:
        - window
        - maximize_bounded
        - minimize_bounded
      final_score_range: [0.0, 1.0]
    failure_policy: &failure_policy
      parse_error: invalid answer JSON shape, missing SMILES, or unparseable SMILES
      validity_error: multi-component SMILES or unsanitizable molecule
      domain_error: outside element, heavy atom, MW, or formal charge domain
      verifier_tool_error: RDKit embedding or force-field parameterization failed
      verifier_timeout: RDKit force-field calculation exceeded timeout

  - verifier_id: rdkit_forcefield_convergence_v1
    name: RDKit ETKDG MMFF/UFF Optimization Convergence Verifier
    version: 1
    formal_track: false
    track_status: prototype
    verifier_image: verifier-grounded:dev
    verification_script: verifiers/rdkit_forcefield/rdkit_convergence.py
    timeout_seconds: 60
    property_name: optimization_converged_fraction
    additional_property_names:
      - energy_range_kcal_mol
      - embedding_success_rate
      - min_nonbonded_distance_angstrom
    resources: *resources
    backend: *backend
    package_versions: *package_versions
    domain: *domain
    property:
      source: RDKit ETKDGv3 conformer generation followed by MMFF94s/MMFF94/UFF minimization
      range: [0.0, 1.0]
      notes: Fraction of retained conformers whose RDKit force-field minimization returned converged status.
    scoring: *scoring
    failure_policy: *failure_policy

schema_version: 2
task_pack:
  id: rdkit_forcefield
  version: 0.2.0
  scoring_version: linear_goal_v2
scoring_profiles:
  rdkit_forcefield_energy_range_kcal_mol_window_0p0_20p0_20p0_v2:
    property: energy_range_kcal_mol
    type: window
    unit: kcal/mol
    full_score:
      min: 0.0
      max: 20.0
    decay:
      lower_width: null
      upper_width: 20.0
    provenance:
      target_source: task_statement
      decay_source: target_window_width_rule
      decision_record: docs/superpowers/plans/2026-07-20-linear-goal-v2-parameter-finalization.md
      review_status: approved
      review_date: '2026-07-21'
      review_owner: benchmark_maintainers
  rdkit_forcefield_optimization_converged_fraction_maximize_0p0_1p0_v2:
    property: optimization_converged_fraction
    type: maximize
    unit: fraction
    full_score_target: 1.0
    zero_score_anchor: 0.0
    provenance:
      target_source: defined_metric_range
      decay_source: defined_metric_range
      decision_record: docs/superpowers/plans/2026-07-20-linear-goal-v2-parameter-finalization.md
      review_status: approved
      review_date: '2026-07-21'
      review_owner: benchmark_maintainers
tasks:
- task_id: rdkit_forcefield_energy_range_window_001
  version: 1
  object_type: small_molecule
  difficulty: prototype
  formal_track: false
  capability_tags:
  - open_generation
  - property_satisfaction
  - rdkit_forcefield
  - conformer_ensemble
  prompt: |
    Propose one valid single-component molecule and provide it as a SMILES string.

    The molecule must satisfy these requirements:
    - The SMILES must describe exactly one component; dot-separated multi-component SMILES are not accepted.
    - Allowed elements: H, B, C, N, O, F, P, S, Cl, Br, I.
    - Heavy atom count must be between 5 and 60 inclusive.
    - Molecular weight must be at most 600.0 daltons.
    - Formal charge must be between -1 and 1 inclusive.
    - Have a moderate RDKit force-field conformer energy range between 0.0 and 20.0 kcal/mol.

    Your final answer must appear on its own line exactly in this format:
    FINAL ANSWER: <SMILES>
  answer_schema:
    format: final_answer_line
    final_answer_prefix: 'FINAL ANSWER:'
    value_type: smiles
    cardinality: one
    example: 'FINAL ANSWER: CCOc1ccc(NC(=O)C)cc1'
  constraints:
  - type: window
    property: energy_range_kcal_mol
    verifier_id: rdkit_forcefield_energy_range_v1
    role: main
    scoring_profile: rdkit_forcefield_energy_range_kcal_mol_window_0p0_20p0_20p0_v2
  scoring:
    aggregation: geometric_mean
    version: linear_goal_v2
  failure_policy:
    invalid_json: parse_error
    invalid_smiles: parse_error
    multi_component: validity_error
    outside_domain: domain_error
    forcefield_failure: verifier_tool_error
    timeout: verifier_timeout
  task_type: open_generation
- task_id: rdkit_forcefield_convergence_max_002
  version: 1
  object_type: small_molecule
  difficulty: prototype
  formal_track: false
  capability_tags:
  - open_generation
  - property_satisfaction
  - rdkit_forcefield
  - geometry_quality
  prompt: |
    Propose one valid single-component molecule and provide it as a SMILES string.

    The molecule must satisfy these requirements:
    - The SMILES must describe exactly one component; dot-separated multi-component SMILES are not accepted.
    - Allowed elements: H, B, C, N, O, F, P, S, Cl, Br, I.
    - Heavy atom count must be between 5 and 60 inclusive.
    - Molecular weight must be at most 600.0 daltons.
    - Formal charge must be between -1 and 1 inclusive.
    - Maximize the fraction of generated conformers whose RDKit force-field minimization converges.

    Your final answer must appear on its own line exactly in this format:
    FINAL ANSWER: <SMILES>
  answer_schema:
    format: final_answer_line
    final_answer_prefix: 'FINAL ANSWER:'
    value_type: smiles
    cardinality: one
    example: 'FINAL ANSWER: CCOc1ccc(NC(=O)C)cc1'
  constraints:
  - type: maximize
    property: optimization_converged_fraction
    verifier_id: rdkit_forcefield_convergence_v1
    role: main
    scoring_profile: rdkit_forcefield_optimization_converged_fraction_maximize_0p0_1p0_v2
  scoring:
    aggregation: geometric_mean
    version: linear_goal_v2
  failure_policy:
    invalid_json: parse_error
    invalid_smiles: parse_error
    multi_component: validity_error
    outside_domain: domain_error
    forcefield_failure: verifier_tool_error
    timeout: verifier_timeout
  task_type: open_generation

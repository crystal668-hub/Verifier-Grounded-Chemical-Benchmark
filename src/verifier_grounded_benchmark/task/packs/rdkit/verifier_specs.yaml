verifiers:
- verifier_id: rdkit_qed_v1
  name: RDKit QED Descriptor Verifier
  version: 1
  verifier_image: verifier-grounded:dev
  descriptor: qed
  resources: &id001
    cpu: 1
    memory_mb: 1024
  backend: &id002
    type: rdkit_descriptors
  package_versions: &id003
    rdkit: 2026.3.2
  domain: &id004
    allowed_elements:
    - H
    - B
    - C
    - N
    - O
    - F
    - P
    - S
    - Cl
    - Br
    - I
    heavy_atom_count:
    - 5
    - 60
    mw:
    - 0.0
    - 600.0
    formal_charge:
    - -1
    - 1
  property:
    source: rdkit.Chem.QED.qed
    range:
    - 0.0
    - 1.0
  failure_policy: &id005
    parse_error: invalid answer JSON shape, missing SMILES, or unparseable SMILES
    validity_error: multi-component SMILES or unsanitizable molecule
    domain_error: outside element, heavy atom, MW, or formal charge domain
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.rdkit_descriptors.rdkit_qed
    timeout_seconds: 60
- verifier_id: rdkit_logp_v1
  name: RDKit logP Descriptor Verifier
  version: 1
  verifier_image: verifier-grounded:dev
  descriptor: logp
  resources: *id001
  backend: *id002
  package_versions: *id003
  domain: *id004
  property:
    source: rdkit.Chem.Crippen.MolLogP
  failure_policy: *id005
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.rdkit_descriptors.rdkit_logp
    timeout_seconds: 60
- verifier_id: rdkit_logp_expert_v1
  name: RDKit Expert logP Target Verifier
  version: 1
  verifier_image: verifier-grounded:dev
  descriptor: logp
  resources: *id001
  backend: *id002
  package_versions: *id003
  domain:
    allowed_elements:
    - H
    - C
    - O
    - N
    - S
    - F
    - Cl
    atom_count:
    - 1
    - 40
    element_fraction_min:
      O: 0.1
  property:
    source: rdkit.Chem.Crippen.MolLogP
  failure_policy:
    parse_error: invalid answer JSON shape, missing SMILES, or unparseable SMILES
    validity_error: multi-component SMILES or unsanitizable molecule
    domain_error: outside allowed elements, total atom count, or oxygen atom fraction
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.rdkit_descriptors.rdkit_logp
    timeout_seconds: 60
- verifier_id: rdkit_tpsa_v1
  name: RDKit TPSA Descriptor Verifier
  version: 1
  verifier_image: verifier-grounded:dev
  descriptor: tpsa
  resources: *id001
  backend: *id002
  package_versions: *id003
  domain: *id004
  property:
    source: rdkit.Chem.rdMolDescriptors.CalcTPSA
    units: angstrom_squared
  failure_policy: *id005
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.rdkit_descriptors.rdkit_tpsa
    timeout_seconds: 60

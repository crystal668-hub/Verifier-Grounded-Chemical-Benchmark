tasks:
- task_id: xtb_gap_window_001
  version: 2
  object_type: small_molecule_3d
  difficulty: basic
  formal_track: true
  capability_tags:
  - open_generation
  - property_satisfaction
  - geometry_quality
  - three_dimensional_geometry
  - xyz
  - xtb
  - homo_lumo_gap
  prompt: |
    Propose one neutral closed-shell small molecule as an XYZ geometry.

    The molecule must satisfy these requirements:
    - The XYZ must contain exactly one connected molecule with all hydrogens explicit.
    - Allowed elements: H, C, N, O, F, P, S, Cl, Br.
    - Atom count must be between 3 and 80 inclusive.
    - Heavy atom count must be between 1 and 40 inclusive.
    - Use at least 6 heavy atoms and at least one hetero atom.
    - Coordinates must be in Angstrom and chemically plausible for a neutral closed-shell small molecule.
    - The submitted XYZ should already be close to a physically reasonable local minimum; rough geometries that require more than about 0.35 eV of relaxation will receive little or no credit.
    - After geometry optimization, have a HOMO-LUMO gap between 3.5 and 5.5 eV.

    Your final answer must appear exactly in this format:
    FINAL ANSWER:
    ```xyz
    <XYZ content>
    ```
  answer_schema:
    format: final_answer_block
    final_answer_prefix: 'FINAL ANSWER:'
    value_type: xyz
    fence_language: xyz
    cardinality: one
    example: |
      FINAL ANSWER:
      ```xyz
      6
      example
      C 0.000000 0.000000 0.000000
      C 1.400000 0.000000 0.000000
      N 2.600000 0.000000 0.000000
      H -0.500000 0.900000 0.000000
      H -0.500000 -0.900000 0.000000
      H 1.400000 1.000000 0.000000
      ```
  constraints:
  - type: window
    property: homo_lumo_gap
    verifier_id: xtb_gap_gfn2_v1
    role: main
    scoring_profile: xtb_homo_lumo_gap_window_3p5_5p5_0p75_v1
  - type: minimize
    property: relaxation_energy
    verifier_id: xtb_relaxation_energy_gfn2_v1
    role: quality_gate
    scoring_profile: xtb_relaxation_energy_minimize_0p0_0p35_v1
  structural_domain:
    heavy_atom_count:
    - 6
    - 40
    hetero_atom_count_min: 1
    formula_denylist:
    - H2O
    - CH4
    - NH3
    - CO2
    - HCN
    - CH2O
    - C2H4
    - C6H6
  scoring:
    aggregation: geometric_mean
    version: linear_goal_v1
  failure_policy:
    malformed_final_answer: parse_error
    invalid_xyz: parse_error
    invalid_coordinates: validity_error
    disconnected_geometry: validity_error
    atom_overlap: validity_error
    outside_domain: domain_error
    missing_xtb: verifier_environment_error
    backend_failure: verifier_tool_error
    timeout: verifier_timeout
  task_type: open_generation

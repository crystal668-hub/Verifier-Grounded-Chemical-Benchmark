    timeout_seconds: 240
- verifier_id: xtb_solvation_selectivity_alpb_v1
  name: xTB GFN2 ALPB Water-Hexane Selectivity Verifier
  version: 1
  formal_track: true
  verifier_image: verifier-grounded:dev
  property_name: alpb_water_hexane_selectivity
  resources: *id001
  backend:
    type: local_xtb
    executable: xtb
    method: GFN2-xTB
    charge: 0
    uhf: 0
    optimize_before_property: true
    solvent_runs:
    - model: alpb
      solvent: water
    - model: alpb
      solvent: hexane
  package_versions: *id003
  domain: *id004
  property:
    source: xTB GFN2-xTB ALPB Gsolv printout on optimized geometry
    units: eV
    notes: Computes Gsolv(hexane) - Gsolv(water); higher values indicate stronger water-selective stabilization.
  failure_policy: *id005
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_solvation_selectivity
    timeout_seconds: 420

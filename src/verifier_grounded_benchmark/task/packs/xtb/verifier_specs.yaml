verifiers:
- verifier_id: xtb_gap_gfn2_v1
  name: xTB GFN2 HOMO-LUMO Gap Verifier
  version: 1
  formal_track: true
  verifier_image: verifier-grounded:dev
  property_name: homo_lumo_gap
  resources: &id001
    cpu: 2
    memory_mb: 2048
  backend: &id002
    type: local_xtb
    executable: xtb
    method: GFN2-xTB
    charge: 0
    uhf: 0
    optimize_before_property: true
  package_versions: &id003
    xtb: external
    rdkit: 2026.3.2
  domain: &id004
    format: xyz
    charge: 0
    multiplicity: 1
    allowed_elements: &id006
    - H
    - C
    - N
    - O
    - F
    - P
    - S
    - Cl
    - Br
    atom_count:
    - 3
    - 80
    heavy_atom_count:
    - 1
    - 40
    coordinate_units: angstrom
    max_absolute_coordinate: 30.0
    min_interatomic_distance: 0.45
    inferred_components: 1
    require_explicit_hydrogens: true
  property:
    source: xTB GFN2-xTB optimized geometry property printout
    units: eV
    notes: Fixed xTB HOMO-LUMO orbital-energy gap, not an experimental optical gap.
  failure_policy: &id005
    parse_error: missing fenced XYZ block or unparseable XYZ content
    validity_error: atom overlap, disconnected geometry, or invalid coordinate values
    domain_error: outside element, atom-count, charge, spin, or coordinate domain
    verifier_environment_error: xTB executable missing or unusable
    verifier_tool_error: xTB calculation failed, optimization did not converge, or output property was missing
    verifier_timeout: xTB calculation exceeded timeout
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_gap
    timeout_seconds: 240
- verifier_id: xtb_dipole_gfn2_v1
  name: xTB GFN2 Dipole Moment Verifier
  version: 1
  formal_track: true
  verifier_image: verifier-grounded:dev
  property_name: dipole_moment
  resources: *id001
  backend: *id002
  package_versions: *id003
  domain: *id004
  property:
    source: xTB GFN2-xTB optimized geometry molecular dipole printout
    units: debye
    notes: Total molecular dipole magnitude.
  failure_policy: *id005
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_dipole
    timeout_seconds: 240
- verifier_id: xtb_relaxation_energy_gfn2_v1
  name: xTB GFN2 Relaxation Energy Verifier
  version: 1
  formal_track: true
  verifier_image: verifier-grounded:dev
  property_name: relaxation_energy
  resources: *id001
  backend:
    type: local_xtb
    executable: xtb
    method: GFN2-xTB
    charge: 0
    uhf: 0
    optimize_before_property: true
    input_singlepoint_before_optimization: true
  package_versions: *id003
  domain: *id004
  property:
    role: geometry_quality_gate
    source: xTB GFN2-xTB input single-point energy minus optimized total energy
    units: eV
    notes: Used as a universal direct-XYZ geometry quality multiplier, not as a standalone chemistry target.
  failure_policy: *id005
  executor:
    type: python_module
    module: verifier_grounded_benchmark.evaluation.open_generation.verifiers.xtb.xtb_relaxation_energy
    timeout_seconds: 300
- verifier_id: xtb_lumo_gfn2_v1
  name: xTB GFN2 LUMO Energy Verifier

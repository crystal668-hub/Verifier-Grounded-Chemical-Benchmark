  backend: *id002
  package_versions: *id003
  domain: *id004
  property:
    source: xTB GFN2-xTB optimized geometry molecular polarizability printout
    units: atomic_units_per_heavy_atom
    notes: Molecular alpha(0) divided by submitted heavy atom count.
  failure_policy: *id005
  executor:
    type: python_module

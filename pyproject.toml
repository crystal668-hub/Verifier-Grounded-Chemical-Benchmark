[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "verifier-grounded-benchmark"
version = "0.1.0"
description = "Verifier-grounded chemical benchmark environment and tooling."
requires-python = ">=3.12,<3.13"
dependencies = [
    "admet-ai==2.0.1",
    "ase==3.28.0",
    "cclib==1.8.1",
    "chembl-webresource-client==0.10.9",
    "mcp>=1.27.2",
    "mp-api==0.46.1",
    "ord-schema==0.6.5",
    "pymatgen==2026.5.4",
    "pyyaml==6.0.3",
    "rdkit==2026.3.2",
]

[dependency-groups]
dev = [
    "pytest==8.4.2",
]

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["benchmark", "verifiers", "verifier_grounded_benchmark", "vgb"]

[tool.hatch.build.targets.wheel.force-include]
"tasks" = "tasks"

[tool.pytest.ini_options]
pythonpath = ["."]
